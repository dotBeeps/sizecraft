name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # `check` aggregates `test` (verified: the test task is in check's task graph),
      # so this runs both the verification suite and unit tests. `build` is kept so the
      # jar artifact below is still produced.
      - run: ./gradlew check build -Dorg.gradle.configuration-cache=false

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: sizecraft-jar
          path: build/libs/sizecraft-*.jar
